<!DOCTYPE html>
<html lang="vi">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APK Dashboard</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>📦 APK Dashboard</h1>
        <p class="subtitle">Chọn một phần để xem: quản lý APK hoặc checklist công việc.</p>
      </div>
      <button id="themeToggle" class="icon-btn" title="Đổi giao diện sáng/tối">🌙</button>

    <main class="content">
      <section class="card">
        <h2>Checklist công việc</h2>

        <a class="btn-primary btn-link" href="/tasks.html">Mở Checklist</a>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="shared.js"></script>

</html>
