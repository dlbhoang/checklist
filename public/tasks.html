<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checklist công việc</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Checklist</h1>
        <p class="subtitle">Quản lý công việc riêng biệt</p>
      </div>
      <button id="themeToggle" class="icon-btn" title="Đổi giao diện sáng/tối">🌙</button>
    </header>

    <main class="content">
      <section class="card">
        <h2>Thêm công việc</h2>
        <form id="taskForm" class="task-form">
          <input type="text" id="taskInput" placeholder="Thêm công việc mới..." autocomplete="off" />
          <button type="submit" class="btn-primary">Thêm</button>
        </form>

        <ul id="taskList" class="task-list"></ul>
      </section>

      <section class="card">
        <a class="btn-primary btn-link" href="/">Quay lại trang chính</a>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="shared.js"></script>
  <script src="tasks.js"></script>
</body>
</html>
